<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Cards - Problemas Visuais</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4A90E2, #50C9C3);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

h1{
    color:white;
    margin-bottom:30px;
    text-align:center;
}

.flashcard-container{
    perspective:1000px;
}

.flashcard{
    width:400px;
    height:250px;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 0.8s;
    cursor:pointer;
}

.flashcard.flip{
    transform:rotateY(180deg);
}

.face{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    box-sizing:border-box;
    backface-visibility:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.front{
    background:white;
    color:#333;
}

.back{
    background:#2C3E50;
    color:white;
    transform:rotateY(180deg);
}

.buttons{
    margin-top:20px;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    background:white;
    color:#333;
    font-weight:bold;
}

button:hover{
    background:#f0f0f0;
}
</style>
</head>
<body>

<h1>Flash Cards - Problemas Visuais</h1>

<div class="flashcard-container">
    <div class="flashcard" id="card">

        <div class="face front" id="front">
            O que e Miopia?
        </div>

        <div class="face back" id="back">
            Dificuldade para enxergar objetos distantes. A imagem e formada antes da retina.
        </div>

    </div>
</div>

<div class="buttons">
    <button onclick="anterior()">Anterior</button>
    <button onclick="proximo()">Proximo</button>
</div>

<script>

const cards = [
{
titulo:"O que e Miopia?",
info:"Dificuldade para enxergar objetos distantes. A imagem e formada antes da retina."
},
{
titulo:"O que e Hipermetropia?",
info:"Dificuldade para enxergar objetos proximos. A imagem e formada atras da retina."
},
{
titulo:"O que e Astigmatismo?",
info:"Visao borrada em diferentes distancias devido a curvatura irregular da cornea."
},
{
titulo:"O que e Daltonismo?",
info:"Alteracao na percepcao das cores, geralmente hereditaria."
},
{
titulo:"O que e Catarata?",
info:"Opacificacao do cristalino, causando visao embaracada e perda gradual da visao."
},
{
titulo:"O que e Glaucoma?",
info:"Doenca que pode danificar o nervo optico devido ao aumento da pressao ocular."
}
];

let atual = 0;

const card = document.getElementById("card");
const front = document.getElementById("front");
const back = document.getElementById("back");

function carregarCard(){
    front.textContent = cards[atual].titulo;
    back.textContent = cards[atual].info;
    card.classList.remove("flip");
}

card.addEventListener("click",()=>{
    card.classList.toggle("flip");
});

function proximo(){
    atual = (atual + 1) % cards.length;
    carregarCard();
}

function anterior(){
    atual = (atual - 1 + cards.length) % cards.length;
    carregarCard();
}

carregarCard();

</script>

</body>
</html>
